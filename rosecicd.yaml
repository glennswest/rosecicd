# rosecicd - Local CI/CD Build Controller
# Deploy via: oc --server=http://192.168.200.2:8082 apply -f rosecicd.yaml
#
# Config: embedded default at /usr/share/rosecicd/config.yaml
# Override: mount a config volume at /etc/rosecicd/ with config.yaml

apiVersion: v1
kind: Pod
metadata:
  name: rosecicd
  namespace: default
  annotations:
    vkube.io/network: gt
    vkube.io/image-policy: auto
    vkube.io/aliases: "rosecicd"
spec:
  restartPolicy: Always
  containers:
    - name: rosecicd
      image: 192.168.200.2:5000/rosecicd:edge
      volumeMounts:
        - name: cache
          mountPath: /data/rosecicd/cache
        - name: ssh-key
          mountPath: /etc/rosecicd/ssh
  volumes:
    - name: cache
      hostPath:
        path: /data/rosecicd/cache
    - name: ssh-key
      hostPath:
        path: /data/rosecicd/ssh
