# rosecicd - Local CI/CD Build Controller
# Deploy via: oc --server=http://api.rose1.gt.lo:8082 apply -f rosecicd.yaml

apiVersion: v1
kind: Pod
metadata:
  name: rosecicd
  namespace: default
  annotations:
    vkube.io/network: gt
    vkube.io/image-policy: auto
    vkube.io/aliases: "rosecicd"
spec:
  restartPolicy: Always
  containers:
    - name: rosecicd
      image: 192.168.200.2:5000/rosecicd:edge
      args: ["--config", "/etc/rosecicd/config.yaml"]
      volumeMounts:
        - name: config
          mountPath: /etc/rosecicd
        - name: cache
          mountPath: /data/rosecicd/cache
  volumes:
    - name: config
      hostPath:
        path: /data/rosecicd/config
    - name: cache
      hostPath:
        path: /data/rosecicd/cache
