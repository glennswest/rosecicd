{{define "repos"}}
{{template "head"}}

<div class="page-header">
    <h1>Repositories</h1>
    <p>Configured build targets</p>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>URL</th>
                <th>Branch</th>
                <th>Dockerfile</th>
                <th>Tags</th>
                <th>Poll</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {{range .}}
            <tr>
                <td><a href="/repos/{{.Name}}">{{.Name}}</a></td>
                <td><a href="{{.URL}}" target="_blank">{{.URL}}</a></td>
                <td>{{.Branch}}</td>
                <td>{{.Dockerfile}}</td>
                <td>{{range .Tags}}{{.}} {{end}}</td>
                <td>{{.Poll}}</td>
                <td>
                    <form hx-post="/api/build" hx-vals='{"repo":"{{.Name}}"}' hx-swap="none">
                        <button type="submit" class="btn btn-sm btn-primary">Build</button>
                    </form>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>

{{template "foot"}}
{{end}}
